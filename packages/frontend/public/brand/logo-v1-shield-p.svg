<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PolyShield logo — Merkle proof pyramid inside a shield">
  <!-- Shield (proof held safe): faint indigo fill + outline -->
  <path d="M32 5 L55 13 V31 C55 44 45 53 32 58 C19 53 9 44 9 31 V13 Z" fill="rgba(130,133,235,0.06)" stroke="#8285eb" stroke-width="2.4" stroke-linejoin="round"/>
  <!-- Sibling hashes (indigo) -->
  <g stroke="#8285eb" stroke-width="1.6" stroke-linecap="round">
    <line x1="32" y1="17" x2="40" y2="30"/>
    <line x1="24" y1="30" x2="20" y2="43"/>
    <line x1="40" y1="30" x2="36" y2="43"/>
    <line x1="40" y1="30" x2="44" y2="43"/>
  </g>
  <g fill="#8285eb">
    <circle cx="40" cy="30" r="2.4"/><circle cx="20" cy="43" r="2.4"/><circle cx="36" cy="43" r="2.4"/><circle cx="44" cy="43" r="2.4"/>
  </g>
  <!-- Gold inclusion path: root -> mid-left -> leaf (last edge leans right) -->
  <path d="M32 17 L24 30 L29 43" fill="none" stroke="#f1c45e" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#f1c45e">
    <circle cx="32" cy="17" r="3.6"/><circle cx="24" cy="30" r="3"/><circle cx="29" cy="43" r="4"/>
  </g>
</svg>
