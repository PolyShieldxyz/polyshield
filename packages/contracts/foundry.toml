[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc = "0.8.24"
# EIP-1153 transient storage (ReentrancyGuardTransient). Polygon PoS supports it
# since the Napoli hardfork; required for the UUPS-upgradeable Vault's reentrancy guard.
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
# Legacy codegen (via_ir = false) to keep compile time + memory low. The only
# stack-too-deep risk was the 9-arg Vault.initialize() calldata in the proxy deploy
# paths; that is isolated into DeployLib.deployVaultProxy (memory-struct arg).
via_ir = false
fs_permissions = [{ access = "read", path = "./" }, { access = "read", path = "../" }]

[profile.default.fuzz]
runs = 1000

[rpc_endpoints]
polygon = "${POLYGON_RPC_URL}"
amoy = "${POLYGON_AMOY_RPC_URL}"

# Contract verification. Polygonscan migrated to the Etherscan v2 unified API, so a
# single Etherscan API key verifies on both Polygon mainnet (137) and Amoy (80002);
# forge resolves the verifier URL from the chain id. Set ETHERSCAN_API_KEY in the env.
[etherscan]
polygon = { key = "${ETHERSCAN_API_KEY}", chain = 137 }
amoy = { key = "${ETHERSCAN_API_KEY}", chain = 80002 }
